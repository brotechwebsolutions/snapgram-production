# =========================
# SnapGram Backend CONFIG
# =========================

spring.application.name=snapgram-backend

# =========================
# SERVER
# =========================
server.port=${PORT:8080}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# =========================
# MONGODB
# =========================
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:snapgram}

# =========================
# JWT
# =========================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# =========================
# MAIL (GMAIL SMTP FIX FOR RENDER)
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=465

spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}

spring.mail.properties.mail.smtp.auth=true

# SSL (IMPORTANT for Render compatibility)
spring.mail.properties.mail.smtp.ssl.enable=true

spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

# Debug logs (turn off later if everything works)
spring.mail.properties.mail.debug=true

# =========================
# CLOUDINARY
# =========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# =========================
# APP URLS
# =========================
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.backend-url=${BACKEND_URL:http://localhost:8080}

# =========================
# OTP / SECURITY
# =========================
app.email-verification.token-expiry-hours=${EMAIL_VERIFICATION_TOKEN_EXPIRY_HOURS:24}
app.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:5}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.password-reset.token-expiry-minutes=${PASSWORD_RESET_TOKEN_EXPIRY_MINUTES:30}

app.security.max-failed-attempts=${MAX_FAILED_ATTEMPTS:5}
app.security.lock-duration-minutes=${LOCK_DURATION_MINUTES:30}

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# =========================
# ACTUATOR
# =========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

# Render port detection fix
management.server.port=${PORT:8080}

# =========================
# LOGGING
# =========================
logging.level.com.snapgram=INFO
logging.level.org.springframework.security=WARN
management.health.mail.enabled=false
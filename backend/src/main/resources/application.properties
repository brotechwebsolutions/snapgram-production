# =========================

# SnapGram Backend CONFIG

# =========================

spring.application.name=snapgram-backend

# =========================

# SERVER (FIXED FOR RENDER)

# =========================

server.port=${PORT:10000}

# =========================

# MONGODB

# =========================

spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:snapgram}

# =========================

# JWT

# =========================

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# =========================

# MAIL (BREVO SMTP FINAL ✅)

# =========================

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587

# 🔥 IMPORTANT: Brevo uses "apikey" as username

spring.mail.username=apikey
spring.mail.password=${BREVO_SMTP_KEY}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# TIMEOUT FIX (VERY IMPORTANT)

spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Debug (disable later if not needed)

spring.mail.properties.mail.debug=true
logging.level.org.springframework.mail=DEBUG

# =========================

# CLOUDINARY

# =========================

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# =========================

# APP URLS

# =========================

app.frontend-url=${FRONTEND_URL:[http://localhost:5173}](http://localhost:5173})
app.backend-url=${BACKEND_URL:[http://localhost:8080}](http://localhost:8080})

# =========================

# OTP / SECURITY

# =========================

app.email-verification.token-expiry-hours=${EMAIL_VERIFICATION_TOKEN_EXPIRY_HOURS:24}
app.otp.expiry-minutes=${OTP_EXPIRY_MINUTES:5}
app.otp.max-attempts=${OTP_MAX_ATTEMPTS:5}
app.password-reset.token-expiry-minutes=${PASSWORD_RESET_TOKEN_EXPIRY_MINUTES:30}

app.security.max-failed-attempts=${MAX_FAILED_ATTEMPTS:5}
app.security.lock-duration-minutes=${LOCK_DURATION_MINUTES:30}

# =========================

# FILE UPLOAD

# =========================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# =========================

# ACTUATOR

# =========================

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator

management.server.port=${PORT:10000}

# =========================

# LOGGING

# =========================

logging.level.com.snapgram=INFO
logging.level.org.springframework.security=WARN

# Disable mail health check

management.health.mail.enabled=false
